<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Kisugu Pre-Paratory School</title>
  <meta name="description" content="Admin login for Kisugu Pre-Paratory School website.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Simple admin login panel -->
  <section class="hero" aria-labelledby="admin-login-title" style="min-height: 100vh; padding-top: var(--nav-total-height);">
    <div class="hero__overlay" aria-hidden="true"></div>
    <div class="hero__content" style="max-width: 420px; margin-inline: auto;">
      <h1 id="admin-login-title" class="hero__title">Admin Login</h1>
      <p class="hero__tagline">Kisugu Pre-Paratory School</p>

      <form class="contact-info-card" action="#" method="post" style="margin-top: var(--space-xl);" aria-label="Admin login form">
        <div class="form-group">
          <label for="admin-username">Username</label>
          <input type="text" id="admin-username" name="username" required placeholder="Enter username">
        </div>
        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" name="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn--primary" style="width: 100%;">Login</button>
      </form>

      <p style="margin-top: var(--space-md); font-size: var(--text-sm); color: var(--color-neutral-500);">
        This panel is for school administrators only.
      </p>
    </div>
  </section>

  <script src="../js/script.js"></script>
</body>
</html>
